name: Build macOS app

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          swift --version
          xcodebuild -version

      - name: Build release binary
        run: swift build -c release

      - name: Package app bundle
        run: ./Scripts/build-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict OctoPilot.app

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoPilot-macos
          path: OctoPilot.app
          retention-days: 14

      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/v')
        run: ditto -c -k --sequesterRsrc --keepParent OctoPilot.app "OctoPilot-${{ github.ref_name }}.zip"

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          --title "OctoPilot ${{ github.ref_name }}"
          --generate-notes
          "OctoPilot-${{ github.ref_name }}.zip#OctoPilot for macOS"
